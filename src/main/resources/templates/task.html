<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tasks</title>
    <meta charset="UTF-8">
</head>
<body>
<h1>Список задач</h1>

<ul>
    <li th:each="task : ${task}">
        <div>
            <b>ID:</b> <span th:text="${task.id}"></span>
        </div>
        <div>
            <b>Название:</b> <span th:text="${task.title}"></span>
        </div>
        <div>
            <b>Описание:</b> <span th:text="${task.description}"></span>
        </div>
        <div>
            <b>Статус:</b> <span th:text="${task.status}"></span>
        </div>
        <div>
            <b>Приоритет:</b> <span th:text="${task.priority}"></span>
        </div>
        <div>
            <b>Создано:</b> <span th:text="${task.createdAt}"></span>
        </div>
        <hr>
    </li>
</ul>

</body>
</html>
